version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stepashka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stepashka
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stepashka"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stepashka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
    container_name: stepashka-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stepashka
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: change_me_access
      JWT_REFRESH_SECRET: change_me_refresh
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_DAYS: 7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stepashka-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:4000/api
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  pgdata:
  redisdata:
